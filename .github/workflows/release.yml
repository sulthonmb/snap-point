name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF##refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF##refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG"

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.15.1"

      - name: Cache Zig global cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-release-${{ runner.os }}-${{ runner.arch }}-

      - name: Run tests
        run: zig build test

      - name: Build ARM64
        run: |
          zig build -Doptimize=ReleaseSmall -Dtarget=aarch64-macos
          cp zig-out/bin/SnapPoint zig-out/bin/SnapPoint-aarch64

      - name: Build x86_64
        run: |
          zig build -Doptimize=ReleaseSmall -Dtarget=x86_64-macos
          cp zig-out/bin/SnapPoint zig-out/bin/SnapPoint-x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            zig-out/bin/SnapPoint-aarch64 \
            zig-out/bin/SnapPoint-x86_64 \
            -output zig-out/bin/SnapPoint
          lipo -info zig-out/bin/SnapPoint
          SIZE=$(stat -f%z zig-out/bin/SnapPoint)
          echo "Universal binary size: $((SIZE / 1024)) KB"

      - name: Assemble app bundle
        run: zig build bundle

      - name: Code sign (ad-hoc for open-source builds)
        # For open-source releases without a paid developer account,
        # we use ad-hoc signing. Users on Apple Silicon can run:
        #   codesign --sign - --force --deep SnapPoint.app
        # For distribution builds with a Developer ID, set APPLE_TEAM_ID secret.
        run: |
          if [[ -n "${APPLE_TEAM_ID:-}" ]]; then
            echo "Signing with Developer ID: $APPLE_TEAM_ID"
            codesign --deep --force --verify --verbose \
              --sign "Developer ID Application: $APPLE_TEAM_ID" \
              --options runtime \
              --timestamp \
              --entitlements resources/Entitlements.plist \
              zig-out/SnapPoint.app
          else
            echo "No APPLE_TEAM_ID — using ad-hoc signature"
            codesign --sign - --force --deep zig-out/SnapPoint.app
          fi
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Notarize (optional)
        if: env.APPLE_ID != '' && env.APPLE_TEAM_ID != ''
        run: ./scripts/notarize.sh
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Create DMG
        run: |
          mkdir -p dist
          ./scripts/create-dmg.sh ${{ steps.version.outputs.version }}
          DMG="SnapPoint-${{ steps.version.outputs.version }}.dmg"
          if [[ -f "$DMG" ]]; then
            mv "$DMG" "dist/$DMG"
          fi
          [[ -f SHA256SUMS.txt ]] && mv SHA256SUMS.txt "dist/SHA256SUMS.txt"
          ls -lh dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md || true)
          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file to handle multi-line safely
          printf '%s' "$NOTES" > release_notes.txt
          echo "Generated release notes (${#NOTES} chars)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SnapPoint ${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            dist/SnapPoint-${{ steps.version.outputs.version }}.dmg
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SnapPoint-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 90
